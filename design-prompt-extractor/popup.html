<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Prompt Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1>Design Prompt Extractor</h1>
        <p>High-fidelity design replication for authorized/owned content only.</p>
      </header>

      <section class="controls">
        <button id="analyzeBtn" class="btn btn-primary">Analyze Current Page</button>
        <button id="generateBtn" class="btn">Generate Design Prompt</button>
        <div class="utility-row">
          <button id="copyBtn" class="btn btn-small">Copy Prompt</button>
          <button id="downloadBtn" class="btn btn-small">Download .txt</button>
        </div>
      </section>

      <section class="settings">
        <h2>Settings</h2>
        <label><input id="includeColors" type="checkbox" /> Include colors</label>
        <label><input id="includeTypography" type="checkbox" /> Include typography</label>
        <label><input id="includeLayout" type="checkbox" /> Include layout</label>
        <label><input id="includeComponents" type="checkbox" /> Include component details</label>
        <label><input id="includeResponsive" type="checkbox" /> Include responsive suggestions</label>
        <label><input id="includeScreenshotVisual" type="checkbox" /> Include screenshot-based visual analysis</label>
        <label><input id="useFullPageStitch" type="checkbox" /> Use multi-screenshot stitched full-page analysis</label>
        <label><input id="includePageContentCopy" type="checkbox" /> Include page text + section copy in prompt</label>
        <label class="select-wrap">
          Output style
          <select id="outputStyle">
            <option value="concise">Concise</option>
            <option value="detailed">Detailed</option>
            <option value="expert">Expert-level</option>
          </select>
        </label>
      </section>

      <section class="status-panel">
        <p id="statusText" class="status status-idle">Ready.</p>
      </section>

      <section class="prompt-panel">
        <label for="promptOutput">Generated Prompt</label>
        <textarea id="promptOutput" rows="14" readonly placeholder="Run analysis, then generate the prompt..."></textarea>
      </section>

      <footer class="footer-note">
        Inspiration and recreation workflow. Use original branding/assets unless authorized.
      </footer>
    </main>

    <script src="utils/screenshotUtils.js"></script>
    <script src="utils/promptBuilder.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
